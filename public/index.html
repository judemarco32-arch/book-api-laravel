<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #1a1a2e;
        }

        header {
            background: linear-gradient(135deg, #1a376c, #2e75b6);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        header h1 { font-size: 28px; }
        header p  { font-size: 14px; opacity: 0.8; margin-top: 4px; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }

        /* FORM CARD */
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 18px;
            color: #1a376c;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f0fb;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }

        label { font-size: 13px; font-weight: 600; color: #444; }

        input, select {
            padding: 10px 14px;
            border: 1px solid #dde3ed;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus { border-color: #2e75b6; }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover   { opacity: 0.88; }
        .btn:active  { transform: scale(0.97); }
        .btn-primary { background: #2e75b6; color: white; }
        .btn-success { background: #176b37; color: white; }
        .btn-warning { background: #c55004; color: white; }
        .btn-danger  { background: #c0392b; color: white; }
        .btn-gray    { background: #6c757d; color: white; }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        /* TABLE */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead tr { background: #1a376c; color: white; }
        thead th { padding: 12px 14px; text-align: left; }

        tbody tr { border-bottom: 1px solid #eef1f7; transition: background 0.15s; }
        tbody tr:hover { background: #f5f8ff; }
        tbody td { padding: 11px 14px; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-yes { background: #d4edda; color: #176b37; }
        .badge-no  { background: #fde8e8; color: #c0392b; }

        .action-btns { display: flex; gap: 6px; }

        .btn-sm {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        /* ALERT */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .alert-success { background: #d4edda; color: #176b37; border: 1px solid #c3e6cb; }
        .alert-error   { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6cb; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 15px;
        }

        /* API URL bar */
        .api-bar {
            background: #1a1a2e;
            color: #7ec8e3;
            padding: 10px 20px;
            font-size: 13px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .api-bar input {
            background: #2a2a4a;
            border: 1px solid #444;
            color: #7ec8e3;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            width: 280px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>📚 Book Management System</h1>
    <p>RESTful API Frontend — Laravel + HTML/CSS/JS</p>
</header>

<div class="api-bar">
    <span>🔗 API Base URL:</span>
    <input type="text" id="apiBase" value="http://127.0.0.1:8000/api" />
    <span style="color:#aaa; font-size:12px;">(change if needed)</span>
</div>

<div class="container">

    <!-- ALERT -->
    <div class="alert alert-success" id="alertSuccess"></div>
    <div class="alert alert-error"   id="alertError"></div>

    <!-- FORM -->
    <div class="card">
        <h2 id="formTitle">➕ Add New Book</h2>

        <input type="hidden" id="editId" value="">

        <div class="form-grid">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="title" placeholder="e.g. Clean Code">
            </div>
            <div class="form-group">
                <label>Author *</label>
                <input type="text" id="author" placeholder="e.g. Robert C. Martin">
            </div>
            <div class="form-group">
                <label>ISBN *</label>
                <input type="text" id="isbn" placeholder="e.g. 9780132350884">
            </div>
            <div class="form-group">
                <label>Published Year *</label>
                <input type="number" id="published_year" placeholder="e.g. 2008" min="1000" max="9999">
            </div>
            <div class="form-group full">
                <label>Availability *</label>
                <select id="is_available">
                    <option value="1">✅ Available</option>
                    <option value="0">❌ Not Available</option>
                </select>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="submitForm()">➕ Add Book</button>
            <button class="btn btn-gray"    onclick="clearForm()" id="cancelBtn" style="display:none;">✖ Cancel</button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h2>📋 All Books <span id="bookCount" style="font-size:14px; color:#888; font-weight:400;"></span></h2>
        <button class="btn btn-success" onclick="loadBooks()" style="margin-bottom:16px;">🔄 Refresh</button>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>ISBN</th>
                        <th>Year</th>
                        <th>Available</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="booksTable">
                    <tr><td colspan="7" class="empty-state">Loading books...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const getBase = () => document.getElementById('apiBase').value.replace(/\/$/, '');

    // ── ALERTS ────────────────────────────────────────────────────────────────
    function showSuccess(msg) {
        const el = document.getElementById('alertSuccess');
        el.textContent = '✅ ' + msg;
        el.style.display = 'block';
        document.getElementById('alertError').style.display = 'none';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function showError(msg) {
        const el = document.getElementById('alertError');
        el.textContent = '❌ ' + msg;
        el.style.display = 'block';
        document.getElementById('alertSuccess').style.display = 'none';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    // ── LOAD ALL BOOKS ────────────────────────────────────────────────────────
    async function loadBooks() {
        try {
            const res  = await fetch(`${getBase()}/books`);
            const data = await res.json();

            const tbody = document.getElementById('booksTable');
            document.getElementById('bookCount').textContent = `(${data.length} books)`;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No books found. Add one above!</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(book => `
                <tr>
                    <td>${book.id}</td>
                    <td><strong>${book.title}</strong></td>
                    <td>${book.author}</td>
                    <td style="font-family:monospace; font-size:12px;">${book.isbn}</td>
                    <td>${book.published_year}</td>
                    <td>
                        <span class="badge ${book.is_available ? 'badge-yes' : 'badge-no'}">
                            ${book.is_available ? 'Available' : 'Unavailable'}
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-warning btn-sm" onclick="editBook(${book.id})">✏️ Edit</button>
                            <button class="btn btn-danger  btn-sm" onclick="deleteBook(${book.id}, '${book.title}')">🗑️ Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');

        } catch (err) {
            showError('Cannot connect to API. Make sure Laravel server is running (php artisan serve).');
            document.getElementById('booksTable').innerHTML =
                `<tr><td colspan="7" class="empty-state">⚠️ Failed to load. Check API URL.</td></tr>`;
        }
    }

    // ── SUBMIT FORM (ADD or UPDATE) ───────────────────────────────────────────
    async function submitForm() {
        const editId = document.getElementById('editId').value;
        const body = {
            title:          document.getElementById('title').value.trim(),
            author:         document.getElementById('author').value.trim(),
            isbn:           document.getElementById('isbn').value.trim(),
            published_year: parseInt(document.getElementById('published_year').value),
            is_available:   document.getElementById('is_available').value === '1',
        };

        if (!body.title || !body.author || !body.isbn || !body.published_year) {
            showError('Please fill in all required fields.');
            return;
        }

        try {
            const isEdit = editId !== '';
            const url    = isEdit ? `${getBase()}/books/${editId}` : `${getBase()}/books`;
            const method = isEdit ? 'PUT' : 'POST';

            const res  = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(body),
            });

            const data = await res.json();

            if (res.ok) {
                showSuccess(isEdit ? `Book "${data.title}" updated successfully!` : `Book "${data.title}" added successfully!`);
                clearForm();
                loadBooks();
            } else {
                const errors = data.errors ? Object.values(data.errors).flat().join(' | ') : data.message;
                showError(errors);
            }

        } catch (err) {
            showError('Cannot connect to API. Make sure Laravel server is running.');
        }
    }

    // ── EDIT BOOK ─────────────────────────────────────────────────────────────
    async function editBook(id) {
        try {
            const res  = await fetch(`${getBase()}/books/${id}`);
            const book = await res.json();

            document.getElementById('editId').value          = book.id;
            document.getElementById('title').value           = book.title;
            document.getElementById('author').value          = book.author;
            document.getElementById('isbn').value            = book.isbn;
            document.getElementById('published_year').value  = book.published_year;
            document.getElementById('is_available').value    = book.is_available ? '1' : '0';

            document.getElementById('formTitle').textContent = `✏️ Edit Book #${book.id}`;
            document.querySelector('.btn-primary').textContent = '💾 Update Book';
            document.getElementById('cancelBtn').style.display = 'inline-block';

            window.scrollTo({ top: 0, behavior: 'smooth' });

        } catch (err) {
            showError('Failed to load book details.');
        }
    }

    // ── DELETE BOOK ───────────────────────────────────────────────────────────
    async function deleteBook(id, title) {
        if (!confirm(`Are you sure you want to delete "${title}"?`)) return;

        try {
            const res = await fetch(`${getBase()}/books/${id}`, { method: 'DELETE' });

            if (res.ok) {
                showSuccess(`Book "${title}" deleted successfully!`);
                loadBooks();
            } else {
                showError('Failed to delete book.');
            }
        } catch (err) {
            showError('Cannot connect to API.');
        }
    }

    // ── CLEAR FORM ────────────────────────────────────────────────────────────
    function clearForm() {
        document.getElementById('editId').value         = '';
        document.getElementById('title').value          = '';
        document.getElementById('author').value         = '';
        document.getElementById('isbn').value           = '';
        document.getElementById('published_year').value = '';
        document.getElementById('is_available').value   = '1';

        document.getElementById('formTitle').textContent          = '➕ Add New Book';
        document.querySelector('.btn-primary').textContent        = '➕ Add Book';
        document.getElementById('cancelBtn').style.display        = 'none';
    }

    // Load books on page load
    loadBooks();
</script>

</body>
  </html>
